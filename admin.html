<!DOCTYPE html>
<html lang="en">
<head>
    <title>Admin - New Post</title>
</head>
<body style="background: #000; color: #fff; font-family: monospace; padding: 2rem;">
    <h1>Create New Blog Post</h1>
    <form id="post-form">
        <input type="text" id="title" placeholder="Blog Title" required 
               style="width: 100%; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #fff; padding: 10px;">
        
        <textarea id="content" placeholder="Write your blog here..." rows="10" required 
                  style="width: 100%; margin-bottom: 10px; background: #111; color: #fff; border: 1px solid #fff; padding: 10px; font-family: inherit;"></textarea>
        
        <input type="password" id="admin-password" placeholder="Admin Password" required 
               style="width: 100%; margin-bottom: 20px; background: #111; color: #fff; border: 1px solid #fff; padding: 10px;">

        <button type="submit" style="background: #fff; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold;">
            Publish Blog
        </button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const supabaseUrl = 'https://ytyafrywokjliplflcmt.supabase.co';
        const supabaseKey = 'sb_publishable_qCgSZovSd-bO6CYpOPk_vg_p0xc92PZ';
        
        const sbAdmin = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const typedPassword = document.getElementById('admin-password').value;

            const { error } = await sbAdmin
                .from('posts')
                .insert([{ 
                    title: title, 
                    content: content, 
                    secret_key: typedPassword 
                }]);

            if (error) {
                alert('Posting Failed: ' + error.message);
            } else {
                alert('Published successfully!');
                // If this file is inside an 'admin' folder, use '../index.html'
                // If it is in the same folder as index.html, use 'index.html'
                window.location.href = 'index.html'; 
            }
        };
    </script>
</body>
</html>
