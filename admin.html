<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - New Post</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            /* Brings the chaos */
            font-family: 'Comic Sans MS', 'Comic Sans', cursive; 
            padding: 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }
        
        input, textarea {
            background: #111;
            color: #fff;
            border: 1px solid #fff;
            padding: 12px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            /* Forces the input boxes to inherit the Comic Sans font */
            font-family: inherit; 
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 24px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            font-family: inherit;
        }

        @media (min-width: 600px) {
            body { padding: 3rem; }
        }
    </style>
</head>
<body>
    <h1>Create New Blog Post</h1>
    <form id="post-form">
        <input type="text" id="title" placeholder="Blog Title" required>
        <textarea id="content" placeholder="Write your blog here..." rows="10" required></textarea>
        <input type="password" id="admin-password" placeholder="Admin Password" required>

        <button type="submit">Publish Blog</button>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://ytyafrywokjliplflcmt.supabase.co';
        const supabaseKey = 'sb_publishable_qCgSZovSd-bO6CYpOPk_vg_p0xc92PZ';
        
        const sbAdmin = supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('post-form').onsubmit = async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const typedPassword = document.getElementById('admin-password').value;

            const { error } = await sbAdmin
                .from('posts')
                .insert([{ 
                    title: title, 
                    content: content, 
                    secret_key: typedPassword 
                }]);

            if (error) {
                alert('Posting Failed: ' + error.message);
            } else {
                alert('Published successfully!');
                window.location.href = 'index.html'; 
            }
        };
    </script>
</body>
</html>
