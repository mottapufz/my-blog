<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-color: #000;
            color: #fff;
            /* Monospace for that terminal feel, Comic Sans for the chaos */
            font-family: 'Courier New', Courier, monospace; 
            padding: 2rem;
            line-height: 1.6;
        }
        .post { border-bottom: 1px solid #333; padding-bottom: 2rem; margin-bottom: 2rem; }
        input, textarea {
            background: #111;
            border: 1px solid #fff;
            color: #fff;
            font-family: inherit;
            display: block;
            margin-bottom: 10px;
            width: 100%;
        }
        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>My Minimalist Blog</h1>
    <div id="blog-posts"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
