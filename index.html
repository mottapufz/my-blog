<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #000;
            color: #ffffff; /* "Matrix Green" or keep #fff for clean white */
            font-family: 'JetBrains Mono', monospace; 
            padding: 1.5rem;
            line-height: 1.6;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Makes titles look bold and techy */
        h1, h2 {
            border-left: 4px solid #fff;
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .post { 
            border-bottom: 1px solid #222; 
            padding-bottom: 2rem; 
            margin-bottom: 2rem; 
        }

        /* Keep your inputs consistent */
        input, textarea {
            background: #0a0a0a;
            border: 1px solid #333;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            padding: 12px;
            width: 100%;
            max-width: 100%; /* Better for mobile */
            box-sizing: border-box;
        }

        button {
            background: #00ff41; /* Tech green button */
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }
    </style>
</head>
    
<body>
    <h1>mottapufz blog</h1>
    <div id="blog-posts"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
